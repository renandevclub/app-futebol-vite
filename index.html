<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FutMilhão" />
    <meta name="description" content="Plataforma de organização de futebol - Futebol Milhão" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/pwa-192.png" />
    <link rel="apple-touch-icon" href="/assets/images/pwa-192.png" />
    <title>Login - Tá na Hora do Futebol</title>
    <!-- Prevenção contra Flash of Unstyled Content (FOUC) -->
    <style>
      html, body {
        background-color: #060913 !important;
        color: #f8fafc !important;
      }
    </style>
    <script>
      (function() {
        const theme = localStorage.getItem('fm-theme');
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          document.head.insertAdjacentHTML('beforeend', '<style id="fouc-light">html, body { background-color: #f8fafc !important; color: #0f172a !important; }</style>');
        }
      })();
    </script>
    <!-- CSS Global e da Página de Login -->
    <link rel="stylesheet" href="/src/styles/core.css" />
    <link rel="stylesheet" href="/src/styles/pages/login.css" />
  </head>
  <body class="login-page">
    <div class="login-page-container">
      <div class="login-box">
        <img
          src="/assets/images/emblema-castor.png"
          alt="Logo Futebol do Líder"
          class="login-logo"
        />
        <h2>Tá na Hora do Futebol ⚽</h2>
        <p class="subtitulo">Conecte-se para organizar e jogar com a galera.</p>

        <div class="role-tabs">
          <button type="button" class="role-tab active" data-role="Jogador">Jogador</button>
          <button type="button" class="role-tab" data-role="Administrador">Administrador</button>
        </div>

        <form id="login-form">
          <div class="input-group">
            <label id="login-username-label" for="login-username">Nome</label>
            <input
              type="text"
              id="login-username"
              name="login-username"
              placeholder="Digite seu nome"
              required
              autocomplete="name"
            />
          </div>

          <div class="input-group" id="phone-group">
            <label for="login-phone">WhatsApp <span style="color: var(--text-muted, #64748b); font-weight:400;">(obrigatório)</span></label>
            <input
              type="tel"
              id="login-phone"
              name="login-phone"
              placeholder="(99) 99999-9999"
              autocomplete="tel"
            />
          </div>

          <div class="input-group" id="password-group" style="display: none;">
            <label for="login-password">Senha</label>
            <input
              type="password"
              id="login-password"
              name="login-password"
              placeholder="Sua senha secreta"
              autocomplete="current-password"
            />
          </div>

          <div class="input-group" style="display: none;">
            <label for="login-role">Entrar como</label>
            <select id="login-role" name="login-role" required>
              <option value="Jogador">Jogador</option>
              <option value="Administrador">Administrador</option>
            </select>
          </div>

          <button type="submit" id="login-button" class="btn btn-primary">
            <span id="btn-text">Entrar no Jogo</span>
          </button>

          <div id="error-message" class="error-message"></div>
        </form>

        <!-- Links comentados na refatoração de autenticação simplificada
        <div class="login-footer-links">
          <a href="pages/register.html" class="footer-link">Criar Conta</a>
          <span class="link-dot">•</span>
          <a href="pages/forgot-password.html" class="footer-link">Esqueci a Senha</a>
        </div>

        <div class="visitor-divider">
          <span>ou</span>
        </div>

        <div class="alternative-login-grid">
          <button type="button" id="google-login-btn" class="btn btn-alternative">
            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
          </button>

          <button type="button" id="visitor-btn" class="btn btn-alternative">
            <span class="visitor-icon">👁️</span>
            <span>Visitante</span>
          </button>
        </div>

        <div id="visitor-modal" class="visitor-modal-overlay" style="display: none;">
          <div class="visitor-modal-card">
            <h3>👋 Acesso como Visitante</h3>
            <p class="visitor-modal-desc">Acompanhe as partidas sem precisar de cadastro completo.</p>
            <form id="visitor-form">
              <div class="input-group">
                <label for="visitor-name">Como podemos te chamar? *</label>
                <input type="text" id="visitor-name" placeholder="Seu nome" required autocomplete="name" />
              </div>
              <div class="input-group">
                <label for="visitor-phone">WhatsApp <span style="color: var(--text-muted, #64748b); font-weight:400;">(opcional)</span></label>
                <input type="tel" id="visitor-phone" placeholder="(99) 99999-9999" autocomplete="tel" />
              </div>
              <div id="visitor-error" class="error-message" style="display:none;"></div>
              <button type="submit" id="visitor-submit" class="btn btn-primary" style="width:100%;">
                <span id="visitor-btn-text">Entrar como Visitante</span>
              </button>
              <button type="button" id="visitor-cancel" class="btn btn-ghost" style="width:100%; margin-top:8px;">
                Cancelar
              </button>
            </form>
          </div>
        </div>
        -->

        <div class="live-match-link">
          <a href="placar-ao-vivo.html" class="btn-live" id="btn-placar-ao-vivo">
            <span class="live-dot"></span>
            Acompanhar Partida Ao Vivo
          </a>
        </div>
      </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- Vite Entry - todos os JSs são carregados via módulo -->
    <script type="module" src="/src/entries/login.js"></script>
  </body>
</html>
