# ============================================================
# HTTPS: Forçar HTTPS em todos os acessos
# ============================================================
[[redirects]]
  from = "http://fut-resenha.netlify.app/*"
  to = "https://fut-resenha.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://futebol-milhao.netlify.app/*"
  to = "https://futebol-milhao.netlify.app/:splat"
  status = 301
  force = true

# ============================================================
# PÁGINA 404 CUSTOMIZADA
# ============================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================
# CONTEXTOS: Configurações por ambiente
# ============================================================

# Deploy Preview (branch != main)
[context.deploy-preview]
  command = "npm run build"
  [context.deploy-preview.environment]
    NODE_ENV = "preview"

# Branch Deploy
[context.branch-deploy]
  command = "npm run build"
  [context.branch-deploy.environment]
    NODE_ENV = "preview"

# Produção
[context.production]
  command = "npm run build"
  [context.production.environment]
    NODE_ENV = "production"
