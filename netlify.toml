# ============================================================
# NETLIFY.TOML — Futebol Milhão (Configuração Otimizada)
# Última atualização: 01/06/2026
# ============================================================

[build]
  # Pasta de saída do build do Vite
  publish = "dist"
  # Comando de build
  command = "npm run build"

# ============================================================
# BUILD: Variáveis de ambiente de build
# ============================================================
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

# ============================================================
# BUILD: Desativar processamento de post-build do Netlify
# O Vite já faz minificação, bundling e compressão de assets.
# ============================================================
[build.processing]
  skip_processing = true

# ============================================================
# HEADERS GLOBAIS: Segurança + Cache padrão para HTML
# Aplicados a todos os arquivos como fallback
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # === SEGURANÇA ===
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    
    # Políticas de Isolamento Cross-Origin
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"
    
    # Content Security Policy (CSP) reforçado
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdn.onesignal.com https://onesignal.com https://*.onesignal.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://onesignal.com https://*.onesignal.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://onesignal.com https://*.onesignal.com; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://www.youtube.com https://youtube.com https://*.youtube.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    
    # Cache padrão: Sempre revalidar arquivos HTML e rotas
    Cache-Control = "public, no-cache, must-revalidate"

# ============================================================
# HEADERS: HTML → Sempre revalidar
# ============================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# ============================================================
# HEADERS: Service Workers e PWA → NUNCA cachear
# Evita que atualizações do app ou push notifications parem de funcionar
# ============================================================
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKUpdaterWorker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

# ============================================================
# HEADERS: Webmanifest → Cache curto (1 dia)
# ============================================================
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "application/manifest+json"

# ============================================================
# HEADERS: Imagens → Cache moderado (7 dias)
# Necessário para imagens em public/assets/images que não possuem hash no nome
# ============================================================
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# ============================================================
# HEADERS: Assets Gerais (JS, CSS, Fontes gerados pelo Vite com hash)
# Cache forte (1 ano) e imutável pois os arquivos usam hash único
# ============================================================
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# HEADERS: Favicon → Cache curto (1 dia)
# ============================================================
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# REDIRECIONAMENTOS: Páginas Principais (Clean URLs / Rewrites)
# Mapeia rotas limpas do site para seus respectivos arquivos físicos
# ============================================================

# Rota raiz de login
[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200

