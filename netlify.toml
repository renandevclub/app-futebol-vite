# ============================================================
# REDIRECIONAMENTOS: Fallback para Single Page Application (SPA)
# Qualquer rota não correspondida cai no index.html
# ============================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================
# CONTEXTOS: Configurações por ambiente
# ============================================================

# Deploy Preview (Branch de teste)
[context.deploy-preview]
  command = "npm run build"
  [context.deploy-preview.environment]
    NODE_ENV = "preview"

# Branch Deploy
[context.branch-deploy]
  command = "npm run build"
  [context.branch-deploy.environment]
    NODE_ENV = "preview"

# Produção
[context.production]
  command = "npm run build"
  [context.production.environment]
    NODE_ENV = "production"
