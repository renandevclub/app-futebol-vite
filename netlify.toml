# ============================================================
# NETLIFY.TOML — Futebol Milhão (Vite Migration)
# Última atualização: 31/05/2026
#
# ESTRATÉGIA DE CACHE (4 camadas):
#
# 1. HTML → SEMPRE revalidar (no-cache)
#    Motivo: O HTML é a "porta de entrada". Ele referencia
#    os JS/CSS com hash. Se o HTML ficar em cache, o
#    navegador nunca verá os novos nomes de arquivo.
#    "no-cache" significa: guarde no cache, mas SEMPRE
#    pergunte ao servidor se mudou antes de usar.
#
# 2. JS/CSS com hash → Cache FORTE (1 ano, immutable)
#    Motivo: O Vite gera hashes nos nomes dos arquivos.
#    Ex: dashboard-a1b2c3d4.js. Se o código muda, o hash
#    muda, gerando um NOVO arquivo com NOVA URL.
#    O navegador nunca tenta carregar o antigo.
#    Cache de 1 ano evita downloads desnecessários.
#
# 3. Service Workers → NUNCA cachear (no-store)
#    Motivo: Service workers precisam ser carregados
#    frescos a cada acesso para funcionar corretamente.
#    Isso inclui sw.js, OneSignalSDKWorker.js,
#    OneSignalSDKUpdaterWorker.js.
#
# 4. Imagens → Cache moderado (7 dias)
#    Motivo: Imagens mudam raramente. 7 dias equilibra
#    performance com atualização.
#
# 5. Fontes → Cache forte (1 ano, immutable)
#    Motivo: Fontes nunca mudam. Cache máximo.
# ============================================================

[build]
  # Vite gera os arquivos prontos na pasta dist/
  publish = "dist"
  # Comando de build
  command = "npm run build"

# ============================================================
# BUILD: Variáveis de ambiente de build
# ============================================================
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

# ============================================================
# BUILD: Processamento de recursos
# ============================================================
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================================
# HEADERS GLOBAIS: Segurança + Cache padrão
# Aplicados a TODOS os arquivos
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # === SEGURANÇA AVANÇADA ===
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    # Cross-Origin policies para isolamento
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"
    # Content-Security-Policy reforçado
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.onesignal.com https://onesignal.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://onesignal.com https://cdn.onesignal.com https://accounts.google.com wss://*.supabase.co; frame-src 'self' https://accounts.google.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    # Cache padrão para HTML e clean URLs
    Cache-Control = "public, no-cache, must-revalidate"

# ============================================================
# HEADERS: HTML → SEMPRE revalidar
# ============================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# ============================================================
# HEADERS: Service Workers → NUNCA cachear
# Motivo: Service workers PRECISAM ser carregados frescos.
# Se ficarem em cache, o navegador pode usar versão antiga
# e as notificações push param de funcionar.
# ============================================================
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKUpdaterWorker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

# ============================================================
# HEADERS: Manifest → cache curto (1 dia)
# ============================================================
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "application/manifest+json"

# ============================================================
# JS/CSS com HASH → Cache FORTE (1 ano, immutable)
# ============================================================
# O Vite coloca hash nos nomes: dashboard-a1b2c3d4.js
# O hash muda quando o conteúdo muda → URL nova → download novo
# "immutable" = o navegador NUNCA revalida (confia que nunca muda)
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# FONTES → Cache forte (1 ano, immutable)
# Fontes nunca mudam. Cache máximo para melhor performance.
# ============================================================
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# IMAGENS → Cache moderado (7 dias)
# ============================================================
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# ============================================================
# Outros assets (gerados pelo Vite com hash)
# ============================================================
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# Favicon → Cache médio (1 dia)
# ============================================================
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# REDIRECIONAMENTOS — Páginas Principais (Clean URLs)
# status = 200 = rewrite (URL do navegador NÃO muda)
# ============================================================

