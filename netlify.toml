# ============================================================
# NETLIFY.TOML — Futebol Milhão (Vite Migration)
# Última atualização: 18/05/2026
#
# ESTRATÉGIA DE CACHE (3 camadas):
#
# 1. HTML → SEMPRE revalidar (no-cache)
#    Motivo: O HTML é a "porta de entrada". Ele referencia
#    os JS/CSS com hash. Se o HTML ficar em cache, o
#    navegador nunca verá os novos nomes de arquivo.
#    "no-cache" significa: guarde no cache, mas SEMPRE
#    pergunte ao servidor se mudou antes de usar.
#
# 2. JS/CSS com hash → Cache FORTE (1 ano, immutable)
#    Motivo: O Vite gera hashes nos nomes dos arquivos.
#    Ex: dashboard-a1b2c3d4.js. Se o código muda, o hash
#    muda, gerando um NOVO arquivo com NOVA URL.
#    O navegador nunca tenta carregar o antigo.
#    Cache de 1 ano evita downloads desnecessários.
#
# 3. Service Workers → NUNCA cachear (no-store)
#    Motivo: Service workers precisam ser carregados
#    frescos a cada acesso para funcionar corretamente.
#    Isso inclui sw.js, OneSignalSDKWorker.js,
#    OneSignalSDKUpdaterWorker.js.
#
# 4. Imagens → Cache moderado (24 horas)
#    Motivo: Imagens mudam raramente. 24h equilibra
#    performance com atualização.
#
# COMPARAÇÃO: Antes vs Depois
# Antes (sem Vite):
#   - CSS/JS sem hash: nomes nunca mudam
#   - Chrome Mobile cacheia agressivamente
#   - Usuário precisa limpar cache manualmente
#   - Netlify tinha que usar "no-cache" em tudo
#
# Depois (com Vite):
#   - CSS/JS com hash: nomes mudam a cada deploy
#   - Chrome Mobile vê arquivo NOVO → baixa automaticamente
#   - Cache forte melhora performance em visitas repetidas
#   - Usuário NUNCA precisa limpar cache
# ============================================================

[build]
  # Vite gera os arquivos prontos na pasta dist/
  publish = "dist"
  # Comando de build
  command = "npm run build"

# ============================================================
# HEADERS: HTML → SEMPRE revalidar
# ============================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# ============================================================
# HEADERS: Service Workers → NUNCA cachear
# Motivo: Service workers PRECISAM ser carregados frescos.
# Se ficarem em cache, o navegador pode usar versão antiga
# e as notificações push param de funcionar.
# Isso inclui o sw.js do PWA e os workers do OneSignal.
# ============================================================
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKUpdaterWorker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

# ============================================================
# HEADERS: Manifest → cache curto (1 dia)
# ============================================================
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "application/manifest+json"

# Também aplica para a raiz (/) e clean URLs sem extensão
[[headers]]
  for = "/*"
  [headers.values]
    # === SEGURANÇA ===
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-XSS-Protection = "1; mode=block"
    # Cache padrão para HTML e clean URLs
    Cache-Control = "public, no-cache, must-revalidate"

# ============================================================
# JS/CSS com HASH → Cache FORTE (1 ano, immutable)
# ============================================================
# O Vite coloca hash nos nomes: dashboard-a1b2c3d4.js
# O hash muda quando o conteúdo muda → URL nova → download novo
# "immutable" = o navegador NUNCA revalida (confia que nunca muda)
# Isso é seguro porque o nome do arquivo contém o hash do conteúdo.
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# IMAGENS → Cache moderado (24 horas)
# ============================================================
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Outros assets (fontes, etc.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# REDIRECIONAMENTOS (Clean URLs)
# ============================================================
# Mantém os mesmos redirects de antes.
# status = 200 = rewrite (URL do navegador NÃO muda)
# O Vite gera o HTML em dist/, então o path é relativo a dist/

[[redirects]]
  from = "/admin-placar"
  to = "/pages/admin-placar.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/pages/dashboard.html"
  status = 200

[[redirects]]
  from = "/detalhes"
  to = "/pages/details.html"
  status = 200

[[redirects]]
  from = "/financeiro"
  to = "/pages/financials.html"
  status = 200

[[redirects]]
  from = "/pagamento"
  to = "/pages/payment.html"
  status = 200

[[redirects]]
  from = "/perfil"
  to = "/pages/profile.html"
  status = 200

[[redirects]]
  from = "/registro"
  to = "/pages/register.html"
  status = 200

[[redirects]]
