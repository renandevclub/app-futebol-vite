<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FutMilhão" />
    <meta name="description" content="Recupere sua senha - Futebol Milhão" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/emblema-castor.png" />
    <link rel="apple-touch-icon" href="/assets/images/emblema-castor.png" />
    <title>Recuperar Senha - Tá na Hora do Futebol</title>
    <style>
      html, body {
        background-color: #060913 !important;
        color: #f8fafc !important;
      }
    </style>
    <link rel="stylesheet" href="/src/styles/core.css" />
    <link rel="stylesheet" href="/src/styles/pages/login.css" />
  </head>
  <body class="login-page">
    <div class="login-page-container">
      <div class="login-box">
        <a href="../index.html" class="login-back-link">
          <span>← Voltar ao Login</span>
        </a>
        <img
          src="/assets/images/emblema-castor.png"
          alt="Logo Futebol do Líder"
          class="login-logo"
        />
        <h2>Recuperar Senha</h2>
        <p class="subtitulo">Digite seu e-mail ou apelido para receber o link de redefinição.</p>

        <form id="forgot-password-form">
          <div class="input-group full-width">
            <label for="forgot-identifier">E-mail ou Apelido</label>
            <input
              type="text"
              id="forgot-identifier"
              name="forgot-identifier"
              placeholder="seu@email.com ou apelido"
              required
              autocomplete="username"
            />
          </div>

          <button type="submit" id="forgot-password-btn" class="btn btn-primary">
            <span>Enviar Link de Recuperação</span>
          </button>

          <div id="forgot-error-message" class="error-message" aria-live="polite"></div>
        </form>

        <div class="login-link">
          <p>Já se lembra? <a href="../index.html">Faça login agora</a></p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script type="module" src="/src/entries/forgot-password.js"></script>
  </body>
</html>
