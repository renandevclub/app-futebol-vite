<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FutMilhão" />
    <meta name="description" content="Plataforma de organização de futebol - Futebol Milhão" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/emblema-castor.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/emblema-castor.png" />
    <link rel="apple-touch-icon" href="/assets/images/emblema-castor.png" />
    <title>Meu Perfil - Futebol Milhão</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/src/styles/core.css" />
    <link rel="stylesheet" href="/src/styles/navigation.css" />
    <link rel="stylesheet" href="/src/styles/pages/profile.css" />
  </head>
  <body>
    <header
      class="main-header"
      style="display: flex; align-items: center; justify-content: space-between"
    >
      <div style="display: flex; align-items: center; gap: 15px">
        <a
          href="welcome.html"
          title="Voltar"
          style="
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: 0.2s;
          "
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </a>
        <h1 style="font-size: 1.2rem; margin: 0; color: var(--text-main)">
          Meu Perfil
        </h1>
      </div>
      <nav class="main-nav" aria-label="Menu principal">
        <a href="../mini-torneio/index-pagina-principal.html" class="btn-header-tournament" title="Mini Torneio">
          <span class="tournament-emoji">🏆</span>
          <span class="tournament-text">Torneio</span>
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Abrir menu"
          aria-expanded="false"
        >
          <span class="nav-toggle-bar"></span>
        </button>
        <div class="nav-buttons-container">
          <a href="welcome.html" class="nav-button nav-home">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Início</span>
          </a>
          <a href="dashboard.html" class="nav-button nav-dashboard">
            <span class="nav-icon">⚽</span>
            <span class="nav-text">Partidas</span>
          </a>
          <a
            href="schedule.html"
            class="nav-button nav-schedule"
            data-admin-only
          >
            <span class="nav-icon">📅</span>
            <span class="nav-text">Agendar</span>
          </a>
          <a href="#" target="_blank" class="nav-button nav-whatsapp">
            <span class="nav-icon">💬</span>
            <span class="nav-text">WhatsApp Admin</span>
          </a>
          <a href="../index.html" class="nav-button nav-logout">
            <span class="nav-icon">🚪</span>
            <span class="nav-text">Sair</span>
          </a>
        </div>
      </nav>
    </header>

    <main class="profile-container">
      <!-- Hero Card - Avatar e Info Principal -->
      <section class="profile-hero-card">
        <div class="profile-avatar-area clickable" id="btn-upload-avatar">
          <div class="avatar-circle" id="avatar-initials">?</div>
          <img id="avatar-image" src="" alt="Foto de perfil" class="avatar-circle-img hidden" />
          <div class="avatar-upload-overlay">
            <i class="fas fa-camera"></i>
          </div>
          <div class="avatar-glow"></div>
          <div class="avatar-loading hidden">
            <span class="avatar-spinner"></span>
          </div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display: none;" />
        <h1 id="profile-name" class="profile-display-name">Carregando...</h1>
        <span id="profile-role-badge" class="profile-role-badge">jogador</span>
        <p id="profile-member-since" class="profile-member-since">
          Membro desde...
        </p>
      </section>

      <!-- Info Pessoal -->
      <section class="card profile-info-card">
        <div class="profile-info-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px dashed var(--border-subtle);">
          <h3 style="margin: 0 !important; padding: 0 !important; border: none !important;">👤 Informações Pessoais</h3>
          <button id="btn-edit-profile" class="btn-edit-profile">
            <i class="fas fa-edit"></i> Editar
          </button>
        </div>
        <div class="profile-info-grid" id="profile-info-grid">
          <!-- Renderizado pelo JS -->
        </div>
      </section>

      <!-- Estatísticas -->
      <section class="card profile-stats-card" data-animate>
        <h3>📊 Minhas Estatísticas</h3>
        <div class="stats-grid" id="player-stats-container">
        </div>
      </section>

      <!-- Conquistas -->
      <section class="card profile-achievements-card" data-animate>
        <h3>🏆 Minhas Conquistas</h3>
        <div id="achievements-container">
        </div>
      </section>

      <!-- Histórico -->
      <section class="card profile-history-card" data-animate>
        <h3>📜 Meu Histórico Recente</h3>
        <div id="match-history-list" class="history-list">
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script type="module" src="/src/entries/profile.js"></script>
  </body>
</html>
