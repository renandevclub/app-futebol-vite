<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FutMilhão" />
    <meta name="description" content="Plataforma de organização de futebol - Futebol Milhão" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/emblema-castor.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/emblema-castor.png" />
    <link rel="apple-touch-icon" href="/assets/images/emblema-castor.png" />
    <title>Detalhes da Partida - Agenda Partida</title>
    <!-- Prevenção contra Flash of Unstyled Content (FOUC) -->
    <style>
      html, body {
        background-color: #060913 !important;
        color: #f8fafc !important;
      }
    </style>
    <script>
      (function() {
        const theme = localStorage.getItem('fm-theme');
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          document.head.insertAdjacentHTML('beforeend', '<style id="fouc-light">html, body { background-color: #f8fafc !important; color: #0f172a !important; }</style>');
        }
      })();
    </script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    />
    <!-- CSS carregado via entry JS -->
    <link rel="stylesheet" href="/src/styles/core.css" />
    <link rel="stylesheet" href="/src/styles/navigation.css" />
    <link rel="stylesheet" href="/src/styles/pages/details.css" />
  </head>
  <body>
    <header
      class="main-header"
      style="display: flex; align-items: center; justify-content: space-between"
    >
      <div style="display: flex; align-items: center; gap: 15px">
        <a
          href="dashboard.html"
          title="Voltar"
          style="
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: 0.2s;
          "
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </a>
        <h1 id="page-header-title">Detalhes da Partida</h1>
      </div>
      <nav class="main-nav" aria-label="Menu principal">
        <a href="../mini-torneio/index-pagina-principal.html" class="btn-header-tournament" title="Mini Torneio">
          <span class="tournament-emoji">🏆</span>
          <span class="tournament-text">Torneio</span>
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Abrir menu"
          aria-expanded="false"
        >
          <span class="nav-toggle-bar"></span>
        </button>
        <div class="nav-buttons-container">
          <a href="dashboard.html" class="nav-button nav-back">
            <span class="nav-icon">←</span>
            <span class="nav-text">Voltar</span>
          </a>
          <a href="welcome.html" class="nav-button nav-home">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Início</span>
          </a>
          <a href="profile.html" class="nav-button nav-profile">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Meu Perfil</span>
          </a>
          <a href="#" target="_blank" class="nav-button nav-whatsapp">
            <span class="nav-icon">💬</span>
            <span class="nav-text">WhatsApp Admin</span>
          </a>
          <a href="../index.html" class="nav-button nav-logout">
            <span class="nav-icon">🚪</span>
            <span class="nav-text">Sair</span>
          </a>
        </div>
      </nav>
    </header>

    <main class="details-container">
      <!-- Seção 1: Informações da Partida -->
      <section id="match-info-card" class="card">
        <div id="match-info"></div>
        <!-- Seção de Ações do Jogador -->
        <div class="action-buttons" style="margin-top: 20px"></div>
      </section>

      <!-- Seção 2: Lista de Jogadores -->
      <section id="player-list-card" class="card">
        <h3>Jogadores Confirmados</h3>
        <div id="player-list"></div>
      </section>

      <!-- Seção 3: Resumo Financeiro (COM O ID CORRETO) -->
      <section id="financial-summary-card" class="card">
        <h3>Resumo Financeiro</h3>
        <div id="financial-summary">
          <p>
            <strong>Jogadores Pagantes:</strong>
            <span id="paid-count">0 / 0</span>
          </p>
          <p>
            <strong>Valor Arrecadado:</strong>
            <span id="collected-amount">R$ 0,00 / R$ 0,00</span>
          </p>
        </div>
        <!-- O JS injetará o botão de resumo financeiro aqui -->
        <div
          id="financial-btn-container"
          style="margin-top: 20px; text-align: center"
        ></div>
      </section>

      <!-- Seção 5: Controles do Administrador -->
      <section id="admin-controls" class="card" style="display: none">
        <h3>Controles do Administrador</h3>
        <div class="admin-buttons-container"></div>
      </section>

      <!-- Seção 6: Votação Pós-Jogo -->
      <section id="voting-section" class="card" style="display: none">
        <h2>🏆 Votação Pós-Jogo 🏆</h2>
        <div class="voting-container">
          <div class="vote-category">
            <h3>Craque da Partida ⭐</h3>
            <div id="best-player-votes" class="vote-list"></div>
          </div>
          <div class="vote-category">
            <h3>Perna de Pau 🪵</h3>
            <div id="worst-player-votes" class="vote-list"></div>
          </div>
        </div>
        <p id="vote-message" class="vote-message"></p>
      </section>
    </main>

    <!-- Caminhos corrigidos para os scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script type="module" src="/src/entries/details.js"></script>
  </body>
</html>
