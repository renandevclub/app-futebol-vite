<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FutMilhão" />
    <meta name="description" content="Redefinir senha - Futebol Milhão" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/emblema-castor.png" />
    <link rel="apple-touch-icon" href="/assets/images/emblema-castor.png" />
    <title>Redefinir Senha - Tá na Hora do Futebol</title>
    <style>
      html, body {
        background-color: #060913 !important;
        color: #f8fafc !important;
      }
    </style>
    <link rel="stylesheet" href="/src/styles/core.css" />
    <link rel="stylesheet" href="/src/styles/pages/login.css" />
  </head>
  <body class="login-page">
    <div class="login-page-container">
      <div class="login-box">
        <a href="../index.html" class="login-back-link">
          <span>← Voltar ao Login</span>
        </a>
        <img
          src="/assets/images/emblema-castor.png"
          alt="Logo Futebol do Líder"
          class="login-logo"
        />
        <h2>Redefinir Senha</h2>
        <p class="subtitulo">Escolha uma nova senha e conclua a recuperação.</p>

        <form id="reset-password-form">
          <div class="input-group full-width">
            <label for="new-password">Nova senha</label>
            <input
              type="password"
              id="new-password"
              name="new-password"
              placeholder="Mínimo 6 caracteres"
              required
              autocomplete="new-password"
            />
          </div>
          <div class="input-group full-width">
            <label for="confirm-password">Confirmar nova senha</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Repita a senha"
              required
              autocomplete="new-password"
            />
          </div>

          <button type="submit" id="reset-password-btn" class="btn btn-primary">
            <span>Redefinir senha</span>
          </button>

          <div id="reset-message" class="error-message"></div>
        </form>

        <div class="login-link">
          <p>Já recebeu o link? <a href="../index.html">Voltar ao Login</a></p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script type="module" src="/src/entries/reset-password.js"></script>
  </body>
</html>
